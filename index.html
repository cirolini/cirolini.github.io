<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rafael Cirolini — Engineering & Applied AI</title>
  <meta name="description" content="Rafael Cirolini — Sr. Manager of Product Development at ADP Labs Brazil. Engineering leadership, applied AI, observability." />

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600&family=Geist+Mono:wght@400;500&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="styles.css" />

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
</head>
<body>
  <nav class="topnav" id="topnav">
    <a href="#top" class="nav-brand">Cirolini<span class="dot">.</span></a>
    <div class="nav-links">
      <a href="#about">About</a>
      <a href="#projects">Work</a>
      <a href="#experience">Experience</a>
      <a href="#writing">Writing</a>
      <a href="#contact" class="cta">Contact</a>
    </div>
  </nav>

  <main id="root"></main>

  <script type="text/babel" src="components/Hero.jsx"></script>
  <script type="text/babel" src="components/About.jsx"></script>
  <script type="text/babel" src="components/Projects.jsx"></script>
  <script type="text/babel" src="components/Experience.jsx"></script>
  <script type="text/babel" src="components/Skills.jsx"></script>
  <script type="text/babel" src="components/Writing.jsx"></script>
  <script type="text/babel" src="components/Contact.jsx"></script>

  <script type="text/babel">
    const App = () => (
      <>
        <Hero />
        <About />
        <Projects />
        <Experience />
        <Skills />
        <Writing />
        <Contact />
      </>
    );
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);

    // Nav scroll state
    const nav = document.getElementById('topnav');
    const onScroll = () => {
      if (window.scrollY > 20) nav.classList.add('scrolled');
      else nav.classList.remove('scrolled');
    };
    window.addEventListener('scroll', onScroll, { passive: true });

    // Smooth anchor scroll
    document.addEventListener('click', (e) => {
      const a = e.target.closest('a[href^="#"]');
      if (!a) return;
      const id = a.getAttribute('href').slice(1);
      if (!id) return;
      const el = document.getElementById(id);
      if (el) {
        e.preventDefault();
        window.scrollTo({ top: el.offsetTop - 40, behavior: 'smooth' });
      }
    });
  </script>
</body>
</html>
